<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>참새연구소</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/main.js" defer></script>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="container">
          <h1 class="brand-title fade-in">참새연구소</h1>
          <p class="brand-subtitle fade-in delay-1">작고 단단한 원격 연결 도구를 연구하고 만드는 팀입니다.</p>
        </div>
      </header>

      <main class="container fade-in delay-2">
        <h2 class="section-title">앱 서비스</h2>
        <section class="app-grid" aria-label="앱 목록">
          <article class="card">
            <img class="app-icon" src="assets/images/tinyssh_icon.png" alt="TinySSH 아이콘" />
            <h3>TinySSH</h3>
            <p>가볍고 빠르게 서버에 접속하는 모바일 SSH 클라이언트입니다.</p>
            <a class="btn primary" href="tinyssh/index.html">자세히 보기</a>
          </article>

          <article class="card">
            <img class="app-icon" src="assets/images/remotehub_icon.png" alt="RemoteHub 아이콘" />
            <h3>RemoteHub</h3>
            <p>앱 내부에서 원격 연결 요청을 관리하는 허브형 도구입니다.</p>
            <a class="btn primary" href="remotehub/index.html">자세히 보기</a>
          </article>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container">© <span data-year></span> 참새연구소. All rights reserved.</div>
      </footer>
    </div>
  </body>
</html>
