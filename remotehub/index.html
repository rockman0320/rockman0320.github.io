<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RemoteHub</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script src="../assets/js/main.js" defer></script>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="container">
          <h1 class="brand-title">RemoteHub</h1>
          <p class="brand-subtitle">원격 연결 요청과 상태를 한곳에서 정리하는 인앱 연결 허브.</p>
        </div>
      </header>

      <main class="container">
        <section class="card app-hero">
          <img class="app-icon" src="../assets/images/remotehub_icon.png" alt="RemoteHub 아이콘" />
          <div>
            <h2 class="section-title">RemoteHub 앱 소개</h2>
            <p class="app-description">요청 승인, 연결 이력, 상태 점검을 앱 내부에서 빠르게 처리할 수 있도록 설계된 워크플로 중심 앱입니다.</p>
          </div>
        </section>

        <section class="card">
          <h2 class="section-title">바로가기</h2>
          <div class="button-row">
            <a class="btn primary" href="#">Google Play 다운로드</a>
            <a class="btn" href="docs/index.html">매뉴얼</a>
            <a class="btn" href="notice/index.html">공지사항</a>
            <a class="btn subtle" href="../index.html">뒤로가기</a>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container">© <span data-year></span> RemoteHub</div>
      </footer>
    </div>
  </body>
</html>
