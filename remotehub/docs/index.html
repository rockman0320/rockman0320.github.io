<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Hub Guide</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        font-size: 15px;
        line-height: 1.65;
      }

      .guide {
        max-width: 540px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .guide-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .guide-title img {
        width: 36px;
        height: 36px;
        flex-shrink: 0;
      }

      .lang-switcher {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
      }

      .lang-btn {
        padding: 5px 14px;
        border-radius: 20px;
        border: 1.5px solid #ccc;
        background: #fff;
        font-size: 0.85rem;
        cursor: pointer;
        color: #555;
        font-family: inherit;
        transition: all 0.15s;
      }

      .lang-btn.active {
        border-color: #222;
        background: #222;
        color: #fff;
        font-weight: 600;
      }

      .guide-desc {
        color: #555;
        margin-bottom: 24px;
        font-size: 0.95rem;
      }

      .step {
        background: #fff;
        border-radius: 14px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      }

      .step h2 {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: #111;
      }

      .step img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 14px;
        display: block;
      }

      .step ol, .step ul {
        padding-left: 20px;
      }

      .step li {
        margin-bottom: 6px;
        color: #333;
      }

      .step p {
        color: #444;
        margin-top: 10px;
      }

      .step .q {
        font-weight: 600;
        color: #222;
        margin-top: 14px;
        margin-bottom: 6px;
        display: block;
      }

      .step .q:first-child { margin-top: 0; }

      .divider {
        border: none;
        border-top: 1px solid #e8e8e8;
        margin: 14px 0;
      }
    </style>
  </head>

      <div id="steps-container"></div>

            { title: '👥 第3步 · 新增與管理好友', blocks: [
              { type: 'img', src: 'friends_list.jpg', alt: '好友清單畫面' },
              { type: 'ol', items: ['點選「+ 新增好友」按鈕', '以手機號碼或使用者ID搜尋', '點選「Add」傳送請求', '對方接受後即顯示於好友清單'] }
            ]},
            { title: '📞 第4步 · 遠端控制請求', blocks: [
              { type: 'img', src: 'camera_preview.jpg', alt: '相機預覽畫面' },
              { type: 'ol', items: ['選擇好友 → 點選遠端請求按鈕', '在相機預覽中確認自己的臉', '準備好後點選發送請求'] },
              { type: 'img', src: 'incoming_screen.jpg', alt: '遠端請求來電畫面' },
              { type: 'ol', start: 4, items: ['目標裝置收到來電畫面＋推播通知', '目標接受 → 設定畫面共用範圍 → 開始遠端作業'] }
            ]},
            { title: '🖥️ 第5步 · 即時遠端', blocks: [
              { type: 'img', src: 'remote_screen.jpg', alt: '即時遠端畫面' },
              { type: 'ul', items: ['<b>控制端</b>：可依畫面比例縮放', '上方按鈕：靜音 🔇 / 結束 ✕', '<b>目標端</b>：可透過狀態列或應用程式內按鈕結束'] }
            ]},
            { title: '💳 第6步 · 票券系統', blocks: [
              { type: 'ul', items: ['觀看1則廣告獲得1張票券', '遠端時間以票券為單位計算', '連線後15秒內結束不消耗票券', '之後每隔一定時間消耗1張票券', '票券用完後自動結束作業', '畫面上方顯示剩餘票券數及警告訊息'] }
            ]}
          ],
          troubleshooting: { title: '🔧 問題排除', items: [
            { q: 'Q. 好友未收到遠端請求', answers: ['確認對方應用程式是否正在執行', '確認對方是否已開啟通知權限', '確認網路連線狀態', '確認雙方是否設定相同的地區伺服器'] },
            { q: 'Q. 畫面出現卡頓或延遲', answers: ['確認網路訊號強度', '關閉背景應用程式', '停止進行中的下載／上傳'] },
            { q: 'Q. 作業自動結束', answers: ['票券不足 — 開始新作業即重新計算票券消耗', '網路中斷 — 重新發送請求後再連線', '應用程式異常關閉 — 重新啟動後再試'] }
          ]},
          security: { title: '🔒 安全性與個人資料', items: ['僅新增可信任的好友', '確認對方臉部後，拒絕不認識的遠端請求'] }
        }
      };

      function buildBlocks(blocks, lang) {
        var base = imgBase(lang);
        return blocks.map(function(b) {
          if (b.type === 'img') return '<img src="' + base + b.src + '" alt="' + b.alt + '" />';
          if (b.type === 'ul') return '<ul>' + b.items.map(function(i) { return '<li>' + i + '</li>'; }).join('') + '</ul>';
          if (b.type === 'ol') return '<ol' + (b.start ? ' start="' + b.start + '"' : '') + '>' + b.items.map(function(i) { return '<li>' + i + '</li>'; }).join('') + '</ol>';
          if (b.type === 'p') return '<p>' + b.text + '</p>';
          return '';
        }).join('');
      }

      function render(lang) {
        var d = T[lang];
        document.documentElement.lang = lang;
        document.title = d.title;
        document.getElementById('page-title').textContent = d.title;
        document.getElementById('page-desc').textContent = d.desc;

        document.querySelectorAll('.lang-btn').forEach(function(btn) {
          btn.classList.toggle('active', btn.dataset.lang === lang);
        });

        var html = d.steps.map(function(s) {
          return '<div class="step"><h2>' + s.title + '</h2>' + buildBlocks(s.blocks, lang) + '</div>';
        }).join('');

        var ts = d.troubleshooting;
        html += '<div class="step"><h2>' + ts.title + '</h2>' +
          ts.items.map(function(item, i) {
            return (i > 0 ? '<hr class="divider" />' : '') +
              '<span class="q">' + item.q + '</span>' +
              '<ul>' + item.answers.map(function(a) { return '<li>' + a + '</li>'; }).join('') + '</ul>';
          }).join('') + '</div>';

        var sec = d.security;
        html += '<div class="step"><h2>' + sec.title + '</h2><ul>' +
          sec.items.map(function(i) { return '<li>' + i + '</li>'; }).join('') + '</ul></div>';

        document.getElementById('steps-container').innerHTML = html;
      }

      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var lang = btn.dataset.lang;
          localStorage.setItem('rh_lang', lang);
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          history.replaceState(null, '', url.toString());
          render(lang);
        });
      });

      var urlLang = new URLSearchParams(window.location.search).get('lang');
      var initLang = (urlLang && T[urlLang]) ? urlLang : (localStorage.getItem('rh_lang') || 'en');
      render(initLang);
    </script>
  </body>
</html>
